x{display:flex;align-items:center;gap:4px;background:#f1f5f9;padding:4px 12px;border-radius:40px;border:1px solid #dae2ed;flex:1 1 160px;min-width:140px}.search-box span{color:#8596b0;font-size:14px}.search-box input{border:0;background:0 0;padding:6px 0;font-size:13px;width:100%;outline:0}.category{background:#fff;border-radius:28px;padding:20px 16px;margin-bottom:24px;box-shadow:0 6px 18px rgba(0,0,0,.02);border:1px solid #e6ecf5}.category-header{gap:12px;margin-bottom:20px}.badge-count,.category-header,.category-icon{display:flex;align-items:center}.category-icon{width:52px;height:52px;background:linear-gradient(145deg,#5a67d8,#6b46c1);border-radius:18px;justify-content:center;font-size:26px;color:#fff;box-shadow:0 8px 16px rgba(90,103,216,.15);flex-shrink:0}.category-title h2{font-size:20px;color:#1e293b;margin-bottom:2px}.badge-count{color:#5f6c86;font-size:13px;gap:4px}.badge-count span{background:#eef3fc;padding:2px 8px;border-radius:30px;font-weight:600;color:#2e405b}.achievements-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}.achievement-card{background:#f9fcff;border-radius:20px;padding:16px 10px 14px;transition:.15s ease;border:1px solid #eef3fc;display:flex;flex-direction:column;align-items:center;text-align:center}.achievement-card:hover{border-color:#8b9dff;box-shadow:0 6px 14px rgba(0,0,0,.02)}.badge-wrapper{position:relative;margin-bottom:12px;cursor:pointer}.badge-image{width:68px;height:68px;border-radius:50%;object-fit:cover;border:3px solid #fff;box-shadow:0 6px 14px rgba(0,0,0,.08);background:#eef3fc;transition:transform .1s}.badge-wrapper:active .badge-image{transform:scale(.97)}.badge-level,.badge-wrapper:hover::after{position:absolute;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;border:2px solid #fff}.badge-wrapper:hover::after{content:"Ã°Å¸â€Â";top:-4px;right:-4px;background:#5a67d8;width:22px;height:22px}.badge-level{bottom:-2px;right:-5px;background:#1e293b;width:26px;height:26px;font-weight:700}.achievement-title{font-weight:700;color:#0f172a;font-size:13px;margin-bottom:4px;line-height:1.3}.achievement-desc{font-size:10.5px;color:#5f6c86;margin-bottom:12px;line-height:1.4;overflow:hidden;min-height:28px;padding:0 2px;display:-webkit-box;display:box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;box-orient:vertical}.requirement-badge{background:#fff;border-radius:30px;padding:6px 8px;font-size:11px;display:inline-flex;align-items:center;gap:5px;border:1px solid #e2eaf5;width:100%;justify-content:center;font-weight:500;color:#364558}.requirement-icon{font-size:12px;opacity:.9}.requirement-value{font-weight:700;color:#5a67d8;margin-left:2px}.status-indicator{margin-top:10px;font-size:9px;padding:4px 8px;border-radius:40px;background:#edf2f9;color:#435269;display:inline-flex;align-items:center;gap:3px;letter-spacing:.2px}.status-indicator.active{background:#dcfce7;color:#166534}.preview-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:1000;justify-content:center;align-items:center;backdrop-filter:blur(4px);padding:16px}.preview-modal.active{display:flex}.preview-content{max-width:94%;max-height:90%;position:relative;animation:fadeUp .2s ease;display:flex;flex-direction:column;align-items:center}.preview-image{max-width:100%;max-height:60vh;border-radius:32px;box-shadow:0 18px 30px rgba(0,0,0,.5);border:3px solid #fff;background:#fff}.preview-close{position:absolute;top:-40px;right:-8px;width:42px;height:42px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;border:0;box-shadow:0 6px 12px rgba(0,0,0,.4)}.preview-info{margin-top:20px;text-align:center;color:#fff;text-shadow:0 1px 4px #000;padding:0 6px}.preview-info h3{font-size:20px;margin-bottom:5px;font-weight:600}.preview-info p{font-size:14px;opacity:.9}.empty-state,.loading{padding:40px 10px;background:#fff;border-radius:40px;text-align:center;color:#7085a3;font-size:15px}@media (max-width:400px){.achievements-grid{grid-template-columns:1fr 1fr;gap:10px}.category{padding:16px 12px}.badge-image{width:62px;height:62px}.achievement-title{font-size:12px}.header h1{font-size:24px}.filter-tab{padding:5px 10px;font-size:11px}}</style></head><body><div class="container"><div class="header"><h1> ðŸ† Platform Achievements <span>gallery</span></h1><p> Earnable badges</p></div><div class="stats-summary" id="statsSummary"></div><div class="filter-bar"><div class="filter-tabs"><button class="filter-tab active" data-filter="all">All</button><button class="filter-tab" data-filter="poemsSubmitted">ðŸ“ Poems</button><button class="filter-tab" data-filter="likesReceived">â¤ï¸ Likes</button><button class="filter-tab" data-filter="commentsMade">ðŸ’¬ Made</button><button class="filter-tab" data-filter="commentsReceived">ðŸ“¨ Received</button></div><div class="search-box"><span>ðŸ”</span><input type="text" id="searchInput" placeholder="Search badges..."></div></div><div id="categoriesContainer"></div></div><div class="preview-modal" id="previewModal"><div class="preview-content"><button class="preview-close" id="closePreview">âœ•</button><img class="preview-image" id="previewImage" src="" alt="badge"><div class="preview-info" id="previewInfo"><h3 id="previewTitle"></h3><p id="previewDescription"></p></div></div></div><script type="module"> import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"; import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"; const firebaseConfig = { apiKey: "AIzaSyC4DHI8aBVY4JjTvJ-r-TGIDPsewtEWxzU", authDomain: "silent-depth.firebaseapp.com", projectId: "silent-depth", storageBucket: "silent-depth.appspot.com", messagingSenderId: "78008755450", appId: "1:78008755450:web:3fd0f0f298a08820935543" }; const app = initializeApp(firebaseConfig); const db = getFirestore(app); let allAchievements = []; let currentFilter = 'all'; let searchTerm = ''; const categoryInfo = { poemsSubmitted: { icon: 'ðŸ“', name: 'Poems submitted', color: '#4299e1' }, likesReceived: { icon: 'â¤ï¸', name: 'Likes received', color: '#ed64a6' }, commentsMade: { icon: 'ðŸ’¬', name: 'Comments made', color: '#48bb78' }, commentsReceived: { icon: 'ðŸ“¨', name: 'Comments received', color: '#9f7aea' } }; // modal functions window.showPreview = function(imageUrl, title, description) { document.getElementById('previewImage').src = imageUrl; document.getElementById('previewTitle').textContent = title; document.getElementById('previewDescription').textContent = description; document.getElementById('previewModal').classList.add('active'); document.body.style.overflow = 'hidden'; }; function hidePreview() { document.getElementById('previewModal').classList.remove('active'); document.body.style.overflow = 'auto'; } document.getElementById('closePreview').addEventListener('click', hidePreview); document.getElementById('previewModal').addEventListener('click', (e) => { if (e.target === document.getElementById('previewModal')) hidePreview(); }); document.addEventListener('keydown', (e) => { if (e.key === 'Escape') hidePreview(); }); // load data async function loadAchievements() { const container = document.getElementById('categoriesContainer'); container.innerHTML = '<div class="loading">ðŸ† loading achievements ...</div>'; try { const snapshot = await getDocs(collection(db, "achievements")); allAchievements = snapshot.docs.map(docSnap => ({ id: docSnap.id, ...docSnap.data() })) .filter(ach => ach.active === true); updateStats(); renderAchievements(); } catch (error) { container.innerHTML = '<div class="empty-state">âš ï¸ could not load Â· using demo data</div>'; // fallback friendly demo data so layout shows allAchievements = [ { id: 'p1', title: 'First poem', description: 'Submit your first poem', active: true, condition: { type: 'poemsSubmitted', min: 1 }, imageUrl: 'https://via.placeholder.com/70/4299e1/ffffff?text=ðŸ“' }, { id: 'p2', title: 'Poet apprentice', description: '5 poems written', active: true, condition: { type: 'poemsSubmitted', min: 5 }, imageUrl: '' }, { id: 'p3', title: 'Published writer', description: '15 poems shared', active: true, condition: { type: 'poemsSubmitted', min: 15 } }, { id: 'l1', title: 'First like', description: 'Someone liked your poem', active: true, condition: { type: 'likesReceived', min: 1 } }, { id: 'l2', title: 'Crowd pleaser', description: '25 likes total', active: true, condition: { type: 'likesReceived', min: 25 } }, { id: 'c1', title: 'Chatter', description: '10 comments made', active: true, condition: { type: 'commentsMade', min: 10 } }, { id: 'cr1', title: 'Popular topic', description: '5 comments received', active: true, condition: { type: 'commentsReceived', min: 5 } }, { id: 'cr2', title: 'In demand', description: '20 comments received', active: true, condition: { type: 'commentsReceived', min: 20 } }, ]; updateStats(); renderAchievements(); } } function updateStats() { const stats = document.getElementById('statsSummary'); const total = allAchievements.length; const byType = { poemsSubmitted: allAchievements.filter(a => a.condition?.type === 'poemsSubmitted').length, likesReceived: allAchievements.filter(a => a.condition?.type === 'likesReceived').length, commentsMade: allAchievements.filter(a => a.condition?.type === 'commentsMade').length, commentsReceived: allAchievements.filter(a => a.condition?.type === 'commentsReceived').length, }; stats.innerHTML = ` <div class="stat-pill"><span>ðŸ† total</span><span class="count">${total}</span></div><div class="stat-pill"><span>ðŸ“ poems</span><span class="count">${byType.poemsSubmitted}</span></div><div class="stat-pill"><span>â¤ï¸ likes</span><span class="count">${byType.likesReceived}</span></div><div class="stat-pill"><span>ðŸ’¬ made</span><span class="count">${byType.commentsMade}</span></div><div class="stat-pill"><span>ðŸ“¨ received</span><span class="count">${byType.commentsReceived}</span></div> `; } function getFilteredAchievements() { let filtered = [...allAchievements]; if (currentFilter !== 'all') { filtered = filtered.filter(ach => ach.condition?.type === currentFilter); } if (searchTerm) { const term = searchTerm.toLowerCase(); filtered = filtered.filter(ach => (ach.title?.toLowerCase().includes(term)) || (ach.description?.toLowerCase().includes(term)) || (ach.condition?.min?.toString().includes(term)) ); } return filtered; } function renderAchievements() { const container = document.getElementById('categoriesContainer'); const filtered = getFilteredAchievements(); if (!filtered.length) { container.innerHTML = '<div class="empty-state">âœ¨ no matching badges</div>'; return; } const grouped = {}; filtered.forEach(ach => { const type = ach.condition?.type || 'other'; if (!grouped[type]) grouped[type] = []; grouped[type].push(ach); }); Object.keys(grouped).forEach(type => { grouped[type].sort((a,b) => (a.condition?.min || 0) - (b.condition?.min || 0)); }); let html = ''; Object.entries(categoryInfo).forEach(([type, info]) => { const items = grouped[type] || []; if (items.length === 0 && currentFilter === 'all' && !searchTerm) return; if (items.length === 0 && currentFilter !== 'all') return; html += ` <div class="category" data-category="${type}"><div class="category-header"><div class="category-icon" style="background:linear-gradient(145deg, ${info.color}, #6b46c1)"> ${info.icon} </div><div class="category-title"><h2>${info.name}</h2><div class="badge-count"><span>${items.length}</span> badges</div></div></div><div class="achievements-grid"> ${items.map(ach => renderCard(ach, info.icon)).join('')} </div></div> `; }); container.innerHTML = html || '<div class="empty-state">â˜ï¸ no categories to show</div>'; } function renderCard(ach, catIcon) { const condition = ach.condition || { min: 0, type: 'poemsSubmitted' }; const minVal = condition.min ?? 0; let levelIcon = minVal <10 ? 'ðŸŒ±' : minVal <30 ? 'ðŸŒ¿' : minVal <60 ? 'ðŸŒŸ' : 'ðŸ‘‘'; const imageUrl = ach.imageUrl || `https://via.placeholder.com/70/5a67d8/ffffff?text=${catIcon}`; const safeTitle = ach.title?.replace(/"/g, '&quot;') || 'achievement'; const safeDesc = ach.description?.replace(/"/g, '&quot;') || 'meet the requirement'; return ` <div class="achievement-card"><div class="badge-wrapper" onclick='showPreview("${imageUrl}", "${safeTitle}", "${safeDesc}")'><img class="badge-image" src="${imageUrl}" alt="${safeTitle}" onerror="this.src='https://via.placeholder.com/70/94a3b8/ffffff?text=ðŸ…'"><div class="badge-level">${levelIcon}</div></div><div class="achievement-title">${safeTitle}</div><div class="achievement-desc">${safeDesc}</div><div class="requirement-badge"><span class="requirement-icon">${catIcon}</span><span class="requirement-text">${minVal}+</span><span class="requirement-value">${condition.type.replace(/([A-Z])/g, ' $1').trim()}</span></div><div class="status-indicator active">âœ… active</div></div> `; } // filter & search listeners document.querySelectorAll('.filter-tab').forEach(tab => { tab.addEventListener('click', (e) => { document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active')); tab.classList.add('active'); currentFilter = tab.dataset.filter; renderAchievements(); }); }); document.getElementById('searchInput').addEventListener('input', (e) => { searchTerm = e.target.value; renderAchievements(); }); loadAchievements(); </script></body></html>
