<!DOCTYPE html>
<html>
<head>
    <meta name="robots" content="noindex, nofollow">
    <title>Test Email Verification</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .verified { background: #c8e6c9; }
        .unverified { background: #ffcdd2; }
        button { padding: 10px 20px; margin: 5px; }
        pre { background: #f5f5f5; padding: 10px; }
    </style>
</head>
<body>
    <h1>Email Verification Test</h1>
    
    <div id="userStatus" class="status">Not logged in</div>
    
    <button onclick="checkStatus()">Check Verification Status</button>
    <button onclick="signOut()">Sign Out</button>
    
    <h3>Login Form (for testing)</h3>
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <button onclick="testLogin()">Test Login</button>
    
    <h3>Debug Info:</h3>
    <pre id="debug"></pre>

    <script type="module">
        import { auth, db } from './usersAccount.js';
        import { signInWithEmailAndPassword, signOut as firebaseSignOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        
        window.testLogin = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const userCred = await signInWithEmailAndPassword(auth, email, password);
                await checkStatus();
            } catch (err) {
                document.getElementById('debug').textContent = 'Login error: ' + err.message;
            }
        };
        
        window.signOut = async () => {
            await firebaseSignOut(auth);
            await checkStatus();
        };
        
        window.checkStatus = async () => {
            const user = auth.currentUser;
            const debug = document.getElementById('debug');
            const statusDiv = document.getElementById('userStatus');
            
            if (!user) {
                statusDiv.textContent = 'Not logged in';
                statusDiv.className = 'status';
                debug.textContent = 'No user logged in';
                return;
            }
            
            let output = [];
            output.push('=== USER INFO ===');
            output.push(`Email: ${user.email}`);
            output.push(`Initial emailVerified: ${user.emailVerified}`);
            
            // Method 1: Reload
            await user.reload();
            output.push(`After reload: ${user.emailVerified}`);
            
            // Method 2: Get ID token
            try {
                const token = await user.getIdTokenResult(true);
                output.push(`Token claims: ${JSON.stringify(token.claims, null, 2)}`);
            } catch (e) {
                output.push(`Token error: ${e.message}`);
            }
            
            // Method 3: Check Firestore
            try {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    output.push(`Firestore emailVerified: ${userDoc.data().emailVerified}`);
                } else {
                    output.push('Firestore: No document');
                }
            } catch (e) {
                output.push(`Firestore error: ${e.message}`);
            }
            
            debug.textContent = output.join('\n');
            
            if (user.emailVerified) {
                statusDiv.textContent = '✅ VERIFIED - Can login';
                statusDiv.className = 'status verified';
            } else {
                statusDiv.textContent = '❌ NOT VERIFIED - Should NOT be able to login';
                statusDiv.className = 'status unverified';
            }
        };
        
        // Check on load
        checkStatus();
    </script>
</body>
</html>
